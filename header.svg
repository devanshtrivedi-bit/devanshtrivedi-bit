<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b16"/>
      <stop offset="100%" stop-color="#030408"/>
    </linearGradient>

    <!-- Glass Pane Fill Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Glass Border Gradient -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Glass Reflection Shine -->
    <linearGradient id="glass-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Ambient Blur Filter -->
    <filter id="ambient-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55" />
    </filter>

    <!-- Glass Drop Shadow -->
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Glowing Cyan Filter (Pulsing Deviation) -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur">
        <animate attributeName="stdDeviation" values="2;4.5;2" dur="4s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Text Styles */
    .title-text {
      fill: #ffffff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      letter-spacing: 6px;
      font-size: 38px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
    }
    .subtitle-text {
      fill: rgba(255, 255, 255, 0.85);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      letter-spacing: 2.5px;
      font-size: 11px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    
    .accent-dot {
      fill: #00f3ff;
      filter: url(#glow-cyan);
    }
  </style>

  <!-- Dark Background -->
  <rect width="800" height="220" fill="url(#bg-gradient)" />

  <!-- Colorful Ambient Glows (Behind the Glass using native SMIL animations) -->
  <g filter="url(#ambient-blur)" opacity="0.65">
    <!-- Cyan Blob -->
    <circle cx="260" cy="110" r="80" fill="#00f3ff">
      <animate attributeName="cx" values="260;220;290;260" dur="10s" repeatCount="indefinite" />
      <animate attributeName="cy" values="110;140;80;110" dur="10s" repeatCount="indefinite" />
      <animate attributeName="r" values="80;95;70;80" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <!-- Pink/Magenta Blob -->
    <circle cx="540" cy="110" r="90" fill="#ff007f">
      <animate attributeName="cx" values="540;580;500;540" dur="12s" repeatCount="indefinite" />
      <animate attributeName="cy" values="110;80;130;110" dur="12s" repeatCount="indefinite" />
      <animate attributeName="r" values="90;105;80;90" dur="12s" repeatCount="indefinite" />
    </circle>
    
    <!-- Purple Blob -->
    <circle cx="400" cy="120" r="70" fill="#bd00ff">
      <animate attributeName="cx" values="400;430;370;400" dur="8s" repeatCount="indefinite" />
      <animate attributeName="cy" values="120;140;100;120" dur="8s" repeatCount="indefinite" />
      <animate attributeName="r" values="70;85;60;70" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Glassmorphism Container Card -->
  <g filter="url(#glass-shadow)">
    <!-- Base frosted glass sheet -->
    <rect x="70" y="30" width="660" height="160" rx="20" ry="20" fill="url(#glass-grad)" stroke="url(#glass-border)" stroke-width="1.5" />
    
    <!-- Glossy shine overlay -->
    <rect x="71" y="31" width="658" height="158" rx="19" ry="19" fill="url(#glass-shine)" pointer-events="none" />
  </g>

  <!-- Glass Pane Content (Name and Title) -->
  <g transform="translate(400, 110)">
    <!-- Main Name (Soft breathing glow) -->
    <text x="0" y="2" class="title-text" text-anchor="middle" filter="url(#glow-cyan)">
      DEVANSH TRIVEDI
    </text>
    
    <!-- Decorative underline -->
    <line x1="-80" y1="18" x2="80" y2="18" stroke="#ffffff" stroke-width="1" opacity="0.3" />
    
    <!-- Animated Glowing accent dot -->
    <circle cx="0" cy="18" r="2.5" class="accent-dot">
      <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- Subtitle Taglines -->
    <text x="0" y="40" class="subtitle-text" text-anchor="middle">
      AI, ROBOTICS &amp; IOT ENGINEER • FULL STACK DEVELOPER
    </text>
  </g>

  <!-- Corner Tech Details for Glass styling -->
  <g fill="#ffffff" font-family="monospace" font-size="8" letter-spacing="1">
    <!-- Fading system status -->
    <text x="90" y="52">
      SYS.INIT: SAFE
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" />
    </text>
    <text x="710" y="52" text-anchor="end" opacity="0.4">LOC: 27.17° N</text>
  </g>
</svg>
