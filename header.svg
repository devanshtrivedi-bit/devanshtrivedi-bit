<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="hud-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030611"/>
      <stop offset="50%" stop-color="#070d24"/>
      <stop offset="100%" stop-color="#02040a"/>
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blueprint Grid -->
    <pattern id="hud-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.08"/>
      <circle cx="0" cy="0" r="1" fill="#00f3ff" opacity="0.2"/>
    </pattern>
  </defs>

  <style>
    /* Animations */
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes bar-grow {
      0%, 100% { transform: scaleY(1.0); }
      50% { transform: scaleY(0.25); }
    }
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(220px); }
    }
    @keyframes bracket-pulse {
      0%, 100% { stroke: #00f3ff; filter: drop-shadow(0px 0px 2px #00f3ff); }
      50% { stroke: #bd00ff; filter: drop-shadow(0px 0px 4px #bd00ff); }
    }
    @keyframes terminal-flicker {
      0%, 100% { opacity: 0.8; }
      95% { opacity: 0.8; }
      96% { opacity: 0.3; }
      97% { opacity: 0.9; }
      98% { opacity: 0.2; }
      99% { opacity: 0.8; }
    }

    /* Core Styles */
    .spin-cw {
      animation: spin-cw 12s linear infinite;
    }
    .spin-ccw {
      animation: spin-ccw 8s linear infinite;
    }
    .pulse-fast {
      animation: pulse-dot 2s infinite ease-in-out;
      transform-origin: 0px 0px;
    }
    .bar-anim-1 { animation: bar-grow 1.3s infinite ease-in-out; transform-origin: 0px 150px; }
    .bar-anim-2 { animation: bar-grow 0.9s infinite ease-in-out; transform-origin: 0px 150px; }
    .bar-anim-3 { animation: bar-grow 1.6s infinite ease-in-out; transform-origin: 0px 150px; }
    .bar-anim-4 { animation: bar-grow 1.1s infinite ease-in-out; transform-origin: 0px 150px; }
    
    .scan-path {
      stroke: #00f3ff;
      stroke-width: 1;
      opacity: 0.1;
      animation: scanline 7s linear infinite;
    }
    .hud-bracket {
      animation: bracket-pulse 4s infinite ease-in-out;
    }
    .title-text {
      fill: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      letter-spacing: 5px;
      filter: drop-shadow(0px 0px 5px rgba(0, 243, 255, 0.5));
    }
    .subtitle-text {
      fill: #00f3ff;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      letter-spacing: 2px;
      animation: terminal-flicker 6s infinite;
    }
    .decor-line {
      stroke: #00f3ff;
      stroke-width: 0.5;
      opacity: 0.25;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#hud-bg)" />
  <rect width="800" height="220" fill="url(#hud-grid)" />

  <!-- Moving Scanline -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan-path" />

  <!-- Left Rotating Radar/Core -->
  <g transform="translate(110, 110)">
    <!-- Outer compass ring -->
    <circle r="75" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4" />
    <!-- Rotating ring 1 -->
    <circle r="60" fill="none" stroke="#00f3ff" stroke-width="1.5" stroke-dasharray="15 8 5 8" class="spin-cw" opacity="0.85" />
    <!-- Rotating ring 2 -->
    <circle r="48" fill="none" stroke="#bd00ff" stroke-width="2" stroke-dasharray="40 20" class="spin-ccw" opacity="0.75" />
    <!-- Rotating ring 3 -->
    <circle r="36" fill="none" stroke="#00f3ff" stroke-width="1" stroke-dasharray="4 4" class="spin-cw" opacity="0.6" />
    <!-- Static Crosshairs -->
    <line x1="-85" y1="0" x2="85" y2="0" stroke="#00f3ff" stroke-width="0.5" opacity="0.3" />
    <line x1="0" y1="-85" x2="0" y2="85" stroke="#00f3ff" stroke-width="0.5" opacity="0.3" />
    <!-- Pulsing Center Node -->
    <circle cx="0" cy="0" r="5" fill="#00f3ff" class="pulse-fast" filter="url(#glow-cyan)" />
    
    <!-- Outer HUD labels -->
    <text x="0" y="-80" fill="#00f3ff" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">N</text>
    <text x="80" y="3" fill="#00f3ff" font-family="monospace" font-size="7" text-anchor="start" opacity="0.5">E</text>
    <text x="0" y="85" fill="#00f3ff" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">S</text>
    <text x="-80" y="3" fill="#00f3ff" font-family="monospace" font-size="7" text-anchor="end" opacity="0.5">W</text>
  </g>

  <!-- Right Animated Frequency Spectrum Chart -->
  <g transform="translate(610, 0)">
    <path d="M 0 150 L 100 150" stroke="#00f3ff" stroke-width="1" opacity="0.3" />
    <rect x="0" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-1" />
    <rect x="8" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-2" />
    <rect x="16" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-3" />
    <rect x="24" y="70" width="4" height="80" fill="none" stroke="#bd00ff" stroke-width="1" class="bar-anim-4" filter="url(#glow-purple)" />
    <rect x="32" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-2" />
    <rect x="40" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-1" />
    <rect x="48" y="70" width="4" height="80" fill="none" stroke="#00f3ff" stroke-width="1" class="bar-anim-3" />
    <rect x="56" y="70" width="4" height="80" fill="none" stroke="#bd00ff" stroke-width="1" class="bar-anim-2" />
    
    <!-- System Diagnostic Overlay -->
    <g fill="#00f3ff" font-family="monospace" font-size="8" opacity="0.65" text-anchor="end">
      <text x="100" y="65">CORE_TEMP: 32.4C</text>
      <text x="100" y="77">AI_INIT: COMPLETE</text>
      <text x="100" y="89">ROBO_LINK: ONLINE</text>
      <text x="100" y="101">SYS_STATUS: ACTIVE</text>
    </g>
  </g>

  <!-- Center Profile Display -->
  <!-- Target Lock Corners / Brackets -->
  <g class="hud-bracket" stroke-width="2" fill="none">
    <!-- Top-Left Corner -->
    <path d="M 230 60 L 210 60 L 210 80" />
    <!-- Bottom-Left Corner -->
    <path d="M 230 160 L 210 160 L 210 140" />
    <!-- Top-Right Corner -->
    <path d="M 570 60 L 590 60 L 590 80" />
    <!-- Bottom-Right Corner -->
    <path d="M 570 160 L 590 160 L 590 140" />
  </g>

  <!-- Center Text and Tagline -->
  <text x="400" y="112" class="title-text" font-size="34" text-anchor="middle">DEVANSH TRIVEDI</text>
  <text x="400" y="145" class="subtitle-text" font-size="10.5" text-anchor="middle">&lt; AI, ROBOTICS &amp; IOT ENGINEER /&gt;</text>

  <!-- High Tech Framing Details -->
  <line x1="20" y1="20" x2="780" y2="20" class="decor-line" />
  <line x1="20" y1="200" x2="780" y2="200" class="decor-line" />
  
  <rect x="20" y="18" width="10" height="4" fill="#00f3ff" opacity="0.4" />
  <rect x="770" y="18" width="10" height="4" fill="#bd00ff" opacity="0.4" />
  <rect x="20" y="198" width="10" height="4" fill="#bd00ff" opacity="0.4" />
  <rect x="770" y="198" width="10" height="4" fill="#00f3ff" opacity="0.4" />

  <!-- Coordinates & Tech Decors -->
  <text x="30" y="32" fill="#00f3ff" font-family="monospace" font-size="7" opacity="0.4">LAT: 27.1767° N • LON: 78.0081° E</text>
  <text x="770" y="32" fill="#00f3ff" font-family="monospace" font-size="7" text-anchor="end" opacity="0.4">SECURE_INIT_LINK // SUCCESS</text>
</svg>
