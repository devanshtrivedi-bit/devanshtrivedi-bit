<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0d0e2e"/>
      <stop offset="100%" stop-color="#05030f"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <style>
    @keyframes grid-scroll {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes text-flicker {
      0%, 100% { opacity: 1; }
      23% { opacity: 1; }
      24% { opacity: 0.8; }
      26% { opacity: 0.8; }
      27% { opacity: 1; }
      70% { opacity: 1; }
      71% { opacity: 0.2; }
      72% { opacity: 0.9; }
      73% { opacity: 0.9; }
      74% { opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-220px); }
      100% { transform: translateY(220px); }
    }
    
    .grid-bg {
      animation: grid-scroll 3s linear infinite;
    }
    .neon-text-cyan {
      fill: #00f3ff;
      filter: url(#glow-cyan);
      font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
      font-weight: 800;
      letter-spacing: 6px;
    }
    .neon-text-magenta {
      fill: #ff007f;
      filter: url(#glow-magenta);
      font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
      font-weight: 800;
      letter-spacing: 6px;
      animation: text-flicker 5s infinite;
    }
    .subtitle {
      fill: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      letter-spacing: 3px;
      opacity: 0.85;
    }
    .accent-bar {
      fill: #ff007f;
      filter: url(#glow-magenta);
      animation: pulse 2s infinite ease-in-out;
    }
    .scan {
      fill: none;
      stroke: #00f3ff;
      stroke-width: 1.5;
      opacity: 0.08;
      animation: scanline 6s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bg-grad)" />

  <!-- Animated Grid (with clipping to keep it in container) -->
  <g clip-path="url(#rect-clip)">
    <rect width="800" height="260" fill="url(#grid)" class="grid-bg" y="-40" />
  </g>
  <clipPath id="rect-clip">
    <rect width="800" height="220" />
  </clipPath>

  <!-- Scanner Line -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan" />

  <!-- Outer Neon Frame Border -->
  <rect x="10" y="10" width="780" height="200" fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.3" rx="5"/>
  <rect x="8" y="8" width="784" height="204" fill="none" stroke="#ff007f" stroke-width="0.5" opacity="0.2" rx="7"/>

  <!-- Left Accent Dots -->
  <circle cx="30" cy="30" r="3" fill="#ff007f" />
  <circle cx="45" cy="30" r="3" fill="#00f3ff" />
  <circle cx="60" cy="30" r="3" fill="#00f3ff" opacity="0.5" />

  <!-- Right Accent Tech Details -->
  <text x="770" y="35" fill="#00f3ff" font-family="monospace" font-size="10" text-anchor="end" opacity="0.6">SYS.STATUS: ACTIVE</text>

  <!-- Title "DEVANSH TRIVEDI" with dual offset colors for chromatic aberration look -->
  <g transform="translate(400, 100)">
    <!-- Cyan Shadow -->
    <text x="-2" y="2" font-size="46" text-anchor="middle" class="neon-text-cyan" opacity="0.8">DEVANSH TRIVEDI</text>
    <!-- Magenta Main -->
    <text x="0" y="0" font-size="46" text-anchor="middle" class="neon-text-magenta">DEVANSH TRIVEDI</text>
  </g>

  <!-- Decorative Separator Line -->
  <rect x="250" y="130" width="300" height="3" class="accent-bar" rx="1.5" />
  
  <!-- Subtitle -->
  <text x="400" y="165" font-size="12" text-anchor="middle" class="subtitle">
    AI, ROBOTICS &amp; IOT ENGINEER <tspan fill="#ff007f">|</tspan> FULL STACK DEVELOPER
  </text>

  <!-- Cyberpunk Tech Decors at the bottom -->
  <path d="M 50 190 L 150 190 L 160 200 L 250 200" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.3" />
  <path d="M 750 190 L 650 190 L 640 200 L 550 200" fill="none" stroke="#ff007f" stroke-width="1" opacity="0.3" />
  <circle cx="250" cy="200" r="2" fill="#00f3ff" opacity="0.5" />
  <circle cx="550" cy="200" r="2" fill="#ff007f" opacity="0.5" />
</svg>
