<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#05070c" />
    </linearGradient>

    <!-- Glass Pane Fill Gradient -->
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Glass Border Gradient -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="70%" stop-color="#00f3ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.30" />
    </linearGradient>

    <!-- Drop Shadow Filter for Pane -->
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Radial Gradients for Background Blobs -->
    <radialGradient id="blob-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blob-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blob-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#bd00ff" stop-opacity="0" />
    </radialGradient>

    <!-- Blur Filter for Blobs -->
    <filter id="blob-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <style>
    /* Pulsating and Moving Blobs */
    @keyframes blob1-move {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(40px, -20px) scale(1.15); }
    }
    @keyframes blob2-move {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(-50px, 30px) scale(1.2); }
    }
    @keyframes blob3-move {
      0%, 100% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(30px, 40px) scale(0.9); }
    }
    @keyframes text-glow {
      0%, 100% { filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.1)); }
      50% { filter: drop-shadow(0px 0px 10px rgba(0, 243, 255, 0.3)); }
    }

    .blob-1 {
      animation: blob1-move 10s infinite ease-in-out;
    }
    .blob-2 {
      animation: blob2-move 12s infinite ease-in-out;
    }
    .blob-3 {
      animation: blob3-move 8s infinite ease-in-out;
    }
    
    .main-title {
      fill: #ffffff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      letter-spacing: 5px;
      animation: text-glow 4s infinite ease-in-out;
    }
    
    .sub-title {
      fill: rgba(255, 255, 255, 0.7);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
    }
  </style>

  <!-- Background Base -->
  <rect width="800" height="220" fill="url(#bg-gradient)" />

  <!-- Animated Glowing Background Blobs (Masked to keep inside boundary) -->
  <g clip-path="url(#container-clip)">
    <!-- Cyan Blob (Top Left) -->
    <circle cx="120" cy="50" r="130" fill="url(#blob-cyan)" class="blob-1" filter="url(#blob-blur)" />
    <!-- Pink Blob (Bottom Right) -->
    <circle cx="680" cy="170" r="140" fill="url(#blob-pink)" class="blob-2" filter="url(#blob-blur)" />
    <!-- Purple Blob (Middle Bottom) -->
    <circle cx="400" cy="200" r="100" fill="url(#blob-purple)" class="blob-3" filter="url(#blob-blur)" />
  </g>
  
  <clipPath id="container-clip">
    <rect width="800" height="220" rx="6" />
  </clipPath>

  <!-- Glassmorphism Floating Pane -->
  <rect x="40" y="30" width="720" height="160" rx="24" fill="url(#glass-fill)" stroke="url(#glass-border)" stroke-width="1.5" filter="url(#glass-shadow)" />

  <!-- Glass Pane Decorative Highlights -->
  <!-- Top Left Gloss lines -->
  <path d="M 60 50 A 10 10 0 0 1 70 40 L 150 40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" />
  
  <!-- Sleek HUD indicator inside glass -->
  <circle cx="70" cy="55" r="3" fill="#ff007f" opacity="0.7" />
  <circle cx="82" cy="55" r="3" fill="#00f3ff" opacity="0.7" />
  <circle cx="94" cy="55" r="3" fill="#ffffff" opacity="0.3" />
  <text x="110" y="59" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="8" letter-spacing="1">DEVANSH_SYS</text>
  
  <!-- Right HUD indicator -->
  <text x="730" y="59" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="8" text-anchor="end" letter-spacing="1">SYS_ACTIVE_v3.5</text>

  <!-- Centered Name and Subtitle -->
  <g transform="translate(400, 115)">
    <!-- Title -->
    <text x="0" y="0" font-size="36" text-anchor="middle" class="main-title">DEVANSH TRIVEDI</text>
    
    <!-- Subtitle -->
    <text x="0" y="32" font-size="11" text-anchor="middle" class="sub-title">
      AI, ROBOTICS &amp; IOT ENGINEER <tspan fill="#ff007f">•</tspan> FULL STACK DEVELOPER
    </text>
  </g>

  <!-- Tech Dots / Grid Lines inside glass pane (low opacity) -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 4" />
  <circle cx="730" cy="160" r="1.5" fill="#00f3ff" opacity="0.5" />
  <circle cx="70" cy="160" r="1.5" fill="#ff007f" opacity="0.5" />
</svg>
